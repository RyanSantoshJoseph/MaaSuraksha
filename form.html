<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pregnancy Screening</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <script src="js/translations.js"></script>
</head>

<body>

  <div id="loader">
    <div class="heart"></div>
    <p>Preparing screening…</p>
  </div>

  <nav class="navbar glass fade-down">
    <div class="logo" data-i18n="nav-brand">🤍 MaaSuraksha</div>
    <div class="nav-actions">
      <button id="langToggle" class="icon-btn">🌐</button>
      <button id="themeToggle" class="icon-btn">🌙</button>
      <a href="index.html" class="nav-btn" data-i18n="nav-home">Home</a>
      <a href="dashboard.html" class="nav-btn" data-i18n="nav-dashboard">Dashboard</a>
    </div>
  </nav>

  <section class="form-wrapper glass fade-up tilt">
    <h2 data-i18n="form-title">Pregnancy Screening</h2>
    <p class="subtext" data-i18n="form-desc">Your answers help us understand risk early.</p>

    <form class="screening-form">
      <div class="field">
        <label data-i18n="label-age">Mother’s Age</label>
        <input type="number" id="ageInput" placeholder="e.g. 26" required>
      </div>

      <div class="field">
        <label data-i18n="label-month">Gestational Month</label>
        <input type="number" id="monthInput" placeholder="1 – 9" required>
      </div>

      <div class="field">
        <label data-i18n="label-bp">Blood Pressure</label>
        <input type="text" id="bpInput" placeholder="120/80" required>
      </div>

      <div class="field">
        <label data-i18n="label-hb">Hemoglobin</label>
        <input type="number" step="0.1" id="hbInput" placeholder="11.5" required>
      </div>

      <div class="field">
        <label data-i18n="label-comp">Previous Complications</label>
        <select id="compInput">
          <option data-i18n="opt-no">No</option>
          <option data-i18n="opt-yes">Yes</option>
        </select>
      </div>

      <button type="submit" class="primary-btn full" data-i18n="btn-run">Run Screening</button>
      <p id="predictionResult" class="ml-note" data-i18n="msg-ai">⚙️ AI model will be embedded here.</p>
    </form>
  </section>

  <script src="js/main.js"></script>
</body>

</html>
